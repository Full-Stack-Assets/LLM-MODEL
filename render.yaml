services:
  - type: web
    name: claude-code-assistant
    runtime: node
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: TAVILY_API_KEY
        sync: false
